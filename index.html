<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priconnecte Messenger</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Уведомления -->
    <div class="notifications-container" id="notificationsContainer"></div>

    <!-- Авторизация -->
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <div class="auth-logo">
                <i class="ri-global-line"></i>
                <h1>priconnecte</h1>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Войти</button>
            </form>

            <form class="auth-form hidden" id="registerForm">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="regName" placeholder="Ваше имя" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Минимум 6 символов" required minlength="6">
                </div>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <!-- Видео сообщение -->
    <div class="video-recording" id="videoRecording">
        <video id="videoPreview" autoplay muted playsinline></video>
        <div class="video-info">
            <span id="videoTime">00:00</span>
            <button id="cancelVideo"><i class="ri-close-line"></i></button>
        </div>
    </div>

    <!-- Модальное окно профиля -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Профиль</h2>
                <button class="modal-close" id="closeProfile"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <div class="profile-avatar-section">
                    <img src="" alt="Avatar" id="profileAvatarPreview">
                    <label for="avatarUpload" class="avatar-upload-btn">
                        <i class="ri-camera-line"></i>
                    </label>
                    <input type="file" id="avatarUpload" accept="image/*" hidden>
                </div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="profileName">
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <input type="text" id="profileStatus" placeholder="Онлайн">
                </div>
                <button class="btn-primary" id="saveProfile">Сохранить</button>
                <button class="btn-secondary" id="logoutBtn">Выйти</button>
            </div>
        </div>
    </div>

    <!-- Новый чат -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Новый чат</h2>
                <button class="modal-close" id="closeNewChat"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Тип</label>
                    <select id="chatType">
                        <option value="private">Личный</option>
                        <option value="group">Группа</option>
                        <option value="channel">Канал</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="newChatName">
                </div>
                <div class="form-group">
                    <label>Участники</label>
                    <div class="contacts-select" id="contactsSelect"></div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="confidentialChat">
                        <span class="checkbox-custom"></span>
                        Конфиденциальный чат
                    </label>
                </div>
                <button class="btn-primary" id="createChat">Создать</button>
            </div>
        </div>
    </div>

    <!-- Добавить контакт -->
    <div class="modal" id="addContactModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Добавить контакт</h2>
                <button class="modal-close" id="closeAddContact"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <div class="search-box">
                    <i class="ri-search-line"></i>
                    <input type="text" id="contactSearch" placeholder="Поиск по имени">
                </div>
                <div class="search-results" id="contactSearchResults"></div>
                <div class="form-group" style="margin-top:20px">
                    <label>Username</label>
                    <input type="text" id="contactUsername" placeholder="@username">
                </div>
                <button class="btn-primary" id="addContact">Добавить</button>
            </div>
        </div>
    </div>

    <!-- Звонок -->
    <div class="modal call-modal" id="callModal">
        <div class="call-content">
            <img src="" alt="" id="callAvatar" class="call-avatar">
            <h2 id="callUserName">Имя</h2>
            <p class="call-status" id="callStatus">Звонок...</p>
            <div class="call-controls">
                <button class="call-btn" id="muteCall"><i class="ri-mic-line"></i></button>
                <button class="call-btn" id="toggleVideo"><i class="ri-video-line"></i></button>
                <button class="call-btn end-call" id="endCall"><i class="ri-phone-off-line"></i></button>
            </div>
            <video id="localVideo" autoplay muted playsinline></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <!-- Настройки -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Настройки</h2>
                <button class="modal-close" id="closeSettings"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body settings-body">
                <div class="setting-item">
                    <span>Тема</span>
                    <select id="themeSelect">
                        <option value="dark">Тёмная</option>
                        <option value="light">Светлая</option>
                        <option value="purple">Фиолетовая</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span>Уведомления</span>
                    <label class="toggle">
                        <input type="checkbox" id="notificationsToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Контекстное меню -->
    <div class="context-menu" id="messageContextMenu">
        <button class="context-item" data-action="reply"><i class="ri-reply-line"></i> Ответить</button>
        <button class="context-item" data-action="edit"><i class="ri-edit-line"></i> Редактировать</button>
        <button class="context-item" data-action="forward"><i class="ri-forward-line"></i> Переслать</button>
        <button class="context-item" data-action="delete"><i class="ri-delete-bin-line"></i> Удалить</button>
    </div>

    <!-- Приложение -->
    <div class="app-container hidden" id="appContainer">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile" id="userProfileBtn">
                    <img src="" alt="" class="user-avatar" id="userAvatar">
                    <div class="user-info">
                        <span class="user-name" id="userName">Пользователь</span>
                        <span class="user-status" id="userStatusText">Онлайн</span>
                    </div>
                </div>
                <div class="header-actions-small">
                    <button class="icon-btn" id="settingsBtn"><i class="ri-settings-4-line"></i></button>
                    <button class="icon-btn" id="newChatBtn"><i class="ri-add-line"></i></button>
                </div>
            </div>

            <div class="search-box">
                <i class="ri-search-line"></i>
                <input type="text" id="searchInput" placeholder="Поиск...">
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="all">Все</button>
                <button class="tab" data-tab="channels">Каналы</button>
                <button class="tab" data-tab="archived">Архив</button>
            </div>

            <div class="contacts-list" id="contactsList"></div>

            <div class="sidebar-footer">
                <button class="footer-btn" id="addContactBtn">
                    <i class="ri-user-add-line"></i> <span class="hide-mobile">Контакт</span>
                </button>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <button class="mobile-toggle" id="openSidebar"><i class="ri-menu-line"></i></button>
                <div class="current-chat-info">
                    <img src="" alt="" class="avatar" id="currentAvatar">
                    <div class="chat-details">
                        <h3 id="currentChatName">Выберите чат</h3>
                        <span class="status" id="currentStatus">Офлайн</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="callBtn"><i class="ri-phone-line"></i></button>
                    <button class="icon-btn" id="videoCallBtn"><i class="ri-video-line"></i></button>
                    <button class="icon-btn" id="chatMenuBtn"><i class="ri-more-2-fill"></i></button>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <i class="ri-chat-smile-2-line"></i>
                    <p>Выберите чат</p>
                </div>
            </div>

            <div class="voice-recording" id="voiceRecording">
                <div class="recording-wave">
                    <span></span><span></span><span></span>
                </div>
                <span id="recordingTime">00:00</span>
                <button id="stopRecording"><i class="ri-stop-circle-line"></i></button>
            </div>

            <div class="input-area">
                <button class="icon-btn" id="emojiBtn"><i class="ri-emotion-line"></i></button>
                <button class="icon-btn" id="voiceBtn"><i class="ri-mic-line"></i></button>
                <button class="icon-btn" id="videoBtn"><i class="ri-video-add-line"></i></button>
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button class="icon-btn send-btn" id="sendBtn"><i class="ri-send-plane-fill"></i></button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
